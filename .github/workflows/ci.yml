jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  verify-build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Display pushed Docker image
        run: |
          echo "=========================================="
          echo "Docker image successfully built and pushed"
          echo "Repository : ${{ needs.build.outputs.image_repository }}"
          echo "Tag        : ${{ needs.build.outputs.image_tag }}"
          echo "Full Image : ${{ needs.build.outputs.image }}"
          echo "=========================================="

  notify-deploy-repo:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deployment repository
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          repository: ${{ github.repository_owner }}/cloud-agnostic-deploy
          event-type: app-image-built
          client-payload: '{"image_tag": "${{ needs.build.outputs.image_tag }}", "commit_sha": "${{ github.sha }}"}'