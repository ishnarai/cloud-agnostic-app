# =============================================================================
# ci.yml - ORCHESTRATOR workflow
# =============================================================================
# The only workflow that triggers automatically. Calls test.yml -> build.yml
# in order, then notifies the deployment repository. Never deploys anything.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    uses: ./.github/workflows/build.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  notify-deploy-repo:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deployment repository
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          repository: ${{ github.repository_owner }}/cloud-agnostic-deploy
          event-type: app-image-built
          client-payload: '{"image_tag": "${{ needs.build.outputs.image_tag }}", "commit_sha": "${{ github.sha }}"}'