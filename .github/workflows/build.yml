# =============================================================================
# build.yml - REUSABLE workflow
# =============================================================================

name: Build and Push Image

on:
  workflow_call:
    outputs:
      image_tag:
        description: "Docker image pushed to Docker Hub"
        value: ${{ jobs.build.outputs.image_tag }}

    secrets:
      DOCKERHUB_USERNAME:
        required: true

      DOCKERHUB_TOKEN:
        required: true

env:
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-agnostic-app

jobs:
  build:

    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.generate-tag.outputs.full_image }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ######################################################################
      # Generate Image Tag
      ######################################################################

      - name: Generate Image Tag
        id: generate-tag
        shell: bash
        run: |
          DATE=$(date +%Y%m%d)
          BUILD_NUMBER=$(printf "%03d" ${GITHUB_RUN_NUMBER})

          IMAGE_TAG="cloud-agnostic-${DATE}.${BUILD_NUMBER}"
          FULL_IMAGE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=============================================="
          echo "Generated Docker Image"
          echo "=============================================="
          echo "DATE          : $DATE"
          echo "BUILD NUMBER  : $BUILD_NUMBER"
          echo "IMAGE TAG     : $IMAGE_TAG"
          echo "FULL IMAGE    : $FULL_IMAGE"
          echo "=============================================="

      ######################################################################
      # Docker Login
      ######################################################################

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ######################################################################
      # Build & Push
      ######################################################################

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.generate-tag.outputs.full_image }}
            ${{ env.IMAGE_REPOSITORY }}:latest

      ######################################################################
      # Verify
      ######################################################################

      - name: Verify Generated Image
        run: |
          echo ""
          echo "Docker image successfully pushed."
          echo ""
          echo "Image Repository:"
          echo "${{ env.IMAGE_REPOSITORY }}"
          echo ""
          echo "Generated Tag:"
          echo "${{ steps.generate-tag.outputs.tag }}"
          echo ""
          echo "Full Image:"
          echo "${{ steps.generate-tag.outputs.full_image }}"
          echo ""

      ######################################################################
      # Output Summary
      ######################################################################

      - name: Build Summary
        run: |
          echo "## Docker Image Published 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${{ env.IMAGE_REPOSITORY }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.generate-tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Image | \`${{ steps.generate-tag.outputs.full_image }}\` |" >> $GITHUB_STEP_SUMMARY